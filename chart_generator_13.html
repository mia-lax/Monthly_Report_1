<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 보고서 그래프 생성기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    padding: 30px 20px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    color: #222;
    margin-bottom: 24px;
    font-weight: 700;
  }

  .layout {
    display: flex;
    gap: 32px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  /* 입력 폼 */
  .form-panel {
    background: white;
    border-radius: 12px;
    padding: 24px;
    width: 520px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .form-panel h2 {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin-bottom: 8px;
  }

  .two-col {
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
  }

  .col-group {
    flex: 1;
  }

  .prev-col { background: #f9f9f9; border-radius: 8px; padding: 8px; }
  .curr-col { background: #FFFDE7; border-radius: 8px; padding: 8px; }

  .col-header {
    margin-bottom: 6px;
  }

  .month-group {
    margin-bottom: 20px;
  }

  .month-title {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .month-title span {
    background: #F5C842;
    color: #333;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .month-title span.prev { background: #e0e0e0; }

  .input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 4px;
  }

  .input-row label {
    font-size: 12px;
    color: #444;
    width: 40px;
    flex-shrink: 0;
  }

  .input-row input {
    flex: 1;
    min-width: 0;
    padding: 5px 6px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: #222;
    transition: border-color 0.2s;
    text-align: right;
  }

  .input-row input:focus {
    outline: none;
    border-color: #F5C842;
  }

  .unit {
    font-size: 12px;
    color: #888;
    width: 20px;
    text-align: left;
    margin-left: 4px;
  }

  .divider {
    border: none;
    border-top: 1px dashed #eee;
    margin: 16px 0;
  }

  .btn-generate {
    width: 100%;
    padding: 12px;
    background: #333;
    color: white;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .btn-generate:hover { background: #111; }

  /* 미리보기 */
  .preview-panel {
    background: white;
    border-radius: 12px;
    padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .preview-panel h2 {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin-bottom: 20px;
    align-self: flex-start;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
    width: 100%;
  }

  /* 그래프 스타일 */
  .chart-wrap { width: 320px; background: white; }

  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-box { width: 18px; height: 10px; border-radius: 2px; }
  .legend-line {
    width: 18px; height: 0;
    border-top: 2px dashed;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 18px; font-weight: 700;
    padding: 3px 8px; border-radius: 3px; color: white;
    white-space: nowrap;
  }
  .badge.gray-badge { background: #555; }
  .badge.orange-badge { background: #E87722; }

  .rate-section { position: relative; height: 110px; margin-bottom: 10px; }

  .month-label { font-size: 16px; color: #333; font-weight: 500; text-align: center; }

  /* 저장 버튼 */
  .btn-save {
    margin-top: 16px;
    padding: 9px 24px;
    background: #F5C842;
    color: #333;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-save:hover { background: #e0b800; }
</style>
</head>
<body>

<h1>📊 월간 보고서 그래프 생성기</h1>

<div class="layout">

  <!-- 입력 폼 -->
  <div class="form-panel">
    <h2>📝 수치 입력</h2>

    <!-- 월 입력 -->
    <div class="section-title">📅 기간</div>
    <div class="two-col">
      <div class="col-group prev-col">
        <div class="col-header"><span class="prev">이전 달/년</span></div>
        <div class="input-row"><input type="text" id="prevLabel" value="26년 1월" placeholder="예: 26년 1월" style="width:100%;text-align:left;"></div>
      </div>
      <div class="col-group curr-col">
        <div class="col-header"><span>이번 달</span></div>
        <div class="input-row"><input type="text" id="currLabel" value="26년 2월" placeholder="예: 26년 2월" style="width:100%;text-align:left;"></div>
      </div>
    </div>

    <hr class="divider">

    <!-- 범례 -->
    <div class="section-title">🏷 범례</div>
    <div class="two-col">
      <div class="col-group prev-col">
        <div class="col-header"><span class="prev">막대 (노랑/회색)</span></div>
        <div class="input-row"><label>노랑</label><input type="text" id="legendGisaCount" value="기사 인입건수" style="text-align:left;"></div>
        <div class="input-row"><label>회색</label><input type="text" id="legendCustomerCount" value="고객 인입건수" style="text-align:left;"></div>
      </div>
      <div class="col-group curr-col">
        <div class="col-header"><span>선 (주황/검정)</span></div>
        <div class="input-row"><label>주황</label><input type="text" id="legendGisaRate" value="기사 응대율" style="text-align:left;"></div>
        <div class="input-row"><label>검정</label><input type="text" id="legendCustomerRate" value="고객 응대율" style="text-align:left;"></div>
      </div>
    </div>

    <hr class="divider">

    <!-- 응대율 -->
    <div class="section-title">📈 응대율</div>
    <div class="two-col">
      <div class="col-group prev-col">
        <div class="col-header"><span class="prev">이전 달/년</span></div>
        <div class="input-row"><label>기사</label><input type="number" id="prevGisa" value="94.5" step="0.1" min="0" max="100"><span class="unit">%</span></div>
        <div class="input-row"><label>고객</label><input type="number" id="prevCustomer" value="96.5" step="0.1" min="0" max="100"><span class="unit">%</span></div>
      </div>
      <div class="col-group curr-col">
        <div class="col-header"><span>이번 달</span></div>
        <div class="input-row"><label>기사</label><input type="number" id="currGisa" value="93.4" step="0.1" min="0" max="100"><span class="unit">%</span></div>
        <div class="input-row"><label>고객</label><input type="number" id="currCustomer" value="96.2" step="0.1" min="0" max="100"><span class="unit">%</span></div>
      </div>
    </div>

    <hr class="divider">

    <!-- 인입건수 -->
    <div class="section-title">📦 인입건수</div>
    <div class="two-col">
      <div class="col-group prev-col">
        <div class="col-header"><span class="prev">이전 달/년</span></div>
        <div class="input-row"><label>기사</label><input type="number" id="prevGisaCount" value="30760"><span class="unit">건</span></div>
        <div class="input-row"><label>고객</label><input type="number" id="prevCustomerCount" value="11912"><span class="unit">건</span></div>
      </div>
      <div class="col-group curr-col">
        <div class="col-header"><span>이번 달</span></div>
        <div class="input-row"><label>기사</label><input type="number" id="currGisaCount" value="26370"><span class="unit">건</span></div>
        <div class="input-row"><label>고객</label><input type="number" id="currCustomerCount" value="10339"><span class="unit">건</span></div>
      </div>
    </div>

    <hr class="divider">

    <!-- Y축 범위 -->
    <div class="section-title">⚙️ Y축 범위</div>
    <div class="two-col">
      <div class="col-group" style="background:#e8f4fd;border-radius:8px;padding:8px;">
        <div class="col-header" style="color:#1a6fa8;font-weight:700;font-size:12px;margin-bottom:6px;">선그래프 (%)</div>
        <div class="input-row"><label>최솟값</label><input type="number" id="yMin" value="93" step="1" min="0" max="100"><span class="unit">%</span></div>
        <div class="input-row"><label>최댓값</label><input type="number" id="yMax" value="98" step="1" min="0" max="100"><span class="unit">%</span></div>
      </div>
      <div class="col-group" style="background:#e8f4fd;border-radius:8px;padding:8px;">
        <div class="col-header" style="color:#1a6fa8;font-weight:700;font-size:12px;margin-bottom:6px;">막대그래프 (건)</div>
        <div class="input-row"><label>최솟값</label><input type="number" id="barYMin" value="0" step="1000"><span class="unit">건</span></div>
        <div class="input-row"><label>최댓값</label><input type="number" id="barYMax" value="50000" step="1000"><span class="unit">건</span></div>
      </div>
    </div>

    <button class="btn-generate" onclick="generateChart()">그래프 생성</button>
  </div>

  <!-- 미리보기 -->
  <div class="preview-panel">
    <h2>👁 미리보기</h2>
    <div id="chartOutput" class="chart-wrap"></div>
    <button class="btn-save" onclick="saveChart()">💾 HTML로 저장</button>
  </div>

</div>

<script>
function fmt(n) {
  return Number(n).toLocaleString('ko-KR');
}

function arrow(diff) {
  return diff >= 0 ? '▲' : '▼';
}

function arrowColor(diff) {
  return diff >= 0 ? '#E53935' : '#2563EB';
}

function generateChart() {
  const prevLabel = document.getElementById('prevLabel').value;
  const currLabel = document.getElementById('currLabel').value;

  const pG  = parseFloat(document.getElementById('prevGisa').value);
  const pC  = parseFloat(document.getElementById('prevCustomer').value);
  const cG  = parseFloat(document.getElementById('currGisa').value);
  const cC  = parseFloat(document.getElementById('currCustomer').value);

  const pGC = parseInt(document.getElementById('prevGisaCount').value);
  const pCC = parseInt(document.getElementById('prevCustomerCount').value);
  const cGC = parseInt(document.getElementById('currGisaCount').value);
  const cCC = parseInt(document.getElementById('currCustomerCount').value);

  // 변화량
  const diffGisa     = cG  - pG;
  const diffCustomer = cC  - pC;
  const diffGisaCount     = Math.round((cGC - pGC) / pGC * 100);
  const diffCustomerCount = Math.round((cCC - pCC) / pCC * 100);

  // 선그래프 y좌표 (입력받은 Y축 범위, height=60, top=10)
  const MIN_R = parseFloat(document.getElementById('yMin').value);
  const MAX_R = parseFloat(document.getElementById('yMax').value);
  const TOP = 28, H = 60;
  function rateY(val) {
    return (MAX_R - val) / (MAX_R - MIN_R) * H + TOP;
  }

  const pCy = rateY(pC); // 이전 고객
  const cCy = rateY(cC); // 현재 고객
  const pGy = rateY(pG); // 이전 기사
  const cGy = rateY(cG); // 현재 기사

  const midCy = (pCy + cCy) / 2;
  const midGy = (pGy + cGy) / 2;

  // 막대 높이 (입력받은 Y축 범위 기준)
  const barYMin = parseInt(document.getElementById('barYMin').value);
  const barYMax = parseInt(document.getElementById('barYMax').value);
  const scale = 170 / (barYMax - barYMin);

  const pGH = Math.round((pGC - barYMin) * scale);
  const pCH = Math.round(pCC * scale);
  const cGH = Math.round((cGC - barYMin) * scale);
  const cCH = Math.round(cCC * scale);

  const SVG_H = 180;
  const pGTop  = SVG_H - pGH;
  const pCTop  = pGTop - pCH;
  const cGTop  = SVG_H - cGH;
  const cCTop  = cGTop - cCH;

  // 사다리꼴 y좌표 중앙
  const trapCustMidY = (pCTop + cCTop) / 2 + (pGTop + cGTop) / 2;
  const trapCustY = ((pCTop + cCTop) / 2 + (pGTop + cGTop) / 2) / 2;
  const trapGisaY = ((pGTop + cGTop) / 2 + SVG_H) / 2;

  const customerBadgeColor = '#555';      // 고객(회색) 선 색상
  const gisaBadgeColor = '#E87722';       // 기사(주황) 선 색상
  const customerCountColor = arrowColor(diffCustomerCount);
  const gisaCountColor = arrowColor(diffGisaCount);

  const legendGisaCount     = document.getElementById('legendGisaCount').value;
  const legendCustomerCount = document.getElementById('legendCustomerCount').value;
  const legendGisaRate      = document.getElementById('legendGisaRate').value;
  const legendCustomerRate  = document.getElementById('legendCustomerRate').value;

  const html = `
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px;font-size:16px;color:#333;">
    <div style="display:flex;gap:14px;justify-content:center;">
      <div class="legend-item"><div class="legend-box" style="background:#F5C842;"></div><span>${legendGisaCount}</span></div>
      <div class="legend-item"><div class="legend-box" style="background:#AAAAAA;"></div><span>${legendCustomerCount}</span></div>
    </div>
    <div style="display:flex;gap:14px;justify-content:center;">
      <div class="legend-item">
        <div class="legend-line" style="border-color:#E87722;"><div style="width:5px;height:5px;border-radius:50%;background:#E87722;position:absolute;"></div></div>
        <span>${legendGisaRate}</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="border-color:#555;"><div style="width:5px;height:5px;border-radius:50%;background:#555;position:absolute;"></div></div>
        <span>${legendCustomerRate}</span>
      </div>
    </div>
  </div>

  <div class="rate-section">
    <svg width="320" height="110" viewBox="0 0 320 110">
      <line x1="50" y1="${pCy}" x2="270" y2="${cCy}" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
      <circle cx="50" cy="${pCy}" r="4" fill="#555"/>
      <circle cx="270" cy="${cCy}" r="4" fill="#555"/>
      <line x1="50" y1="${pGy}" x2="270" y2="${cGy}" stroke="#E87722" stroke-width="1.5" stroke-dasharray="4,3"/>
      <circle cx="50" cy="${pGy}" r="4" fill="#E87722"/>
      <circle cx="270" cy="${cGy}" r="4" fill="#E87722"/>
    </svg>

    <!-- 고객(회색) 라벨: 점 위 -->
    <div style="position:absolute;left:50px;top:${pCy}px;font-size:16px;font-weight:700;color:#333;transform:translateX(-50%) translateY(calc(-100% - 6px));">${pC}%</div>
    <div style="position:absolute;left:270px;top:${cCy}px;font-size:16px;font-weight:700;color:#333;transform:translateX(-50%) translateY(calc(-100% - 6px));">${cC}%</div>
    <!-- 고객(회색) 태그: 선 위 -->
    <div style="position:absolute;left:50%;transform:translateX(-50%) translateY(calc(-100% - 4px));top:${midCy}px;">
      <span class="badge gray-badge" style="background:${customerBadgeColor};">${arrow(diffCustomer)}${Math.abs(diffCustomer).toFixed(1)}%p</span>
    </div>

    <!-- 기사(주황) 라벨: 점 아래 -->
    <div style="position:absolute;left:50px;top:${pGy}px;font-size:16px;font-weight:700;color:#E87722;transform:translateX(-50%) translateY(6px);">${pG}%</div>
    <div style="position:absolute;left:270px;top:${cGy}px;font-size:16px;font-weight:700;color:#E87722;transform:translateX(-50%) translateY(6px);">${cG}%</div>
    <!-- 기사(주황) 태그: 선 아래 -->
    <div style="position:absolute;left:50%;transform:translateX(-50%) translateY(4px);top:${midGy}px;">
      <span class="badge orange-badge" style="background:${gisaBadgeColor};">${arrow(diffGisa)}${Math.abs(diffGisa).toFixed(1)}%p</span>
    </div>
  </div>

  <div style="position:relative;">
    <svg width="320" height="180" viewBox="0 0 320 180">
      <line x1="0" y1="180" x2="320" y2="180" stroke="#333" stroke-width="1.5"/>

      <polygon points="90,${pGTop} 230,${cGTop} 230,205 90,205" fill="#F5C842" opacity="0.4"/>
      <polygon points="90,${pCTop} 230,${cCTop} 230,${cGTop} 90,${pGTop}" fill="#AAAAAA" opacity="0.4"/>

      <rect x="30" y="${pGTop}" width="60" height="${pGH}" fill="#F5C842"/>
      <rect x="30" y="${pCTop}" width="60" height="${pCH}" fill="#AAAAAA"/>
      <rect x="230" y="${cGTop}" width="60" height="${cGH}" fill="#F5C842"/>
      <rect x="230" y="${cCTop}" width="60" height="${cCH}" fill="#AAAAAA"/>

      <text x="60" y="${pCTop + pCH/2 + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="16" font-weight="700" fill="#333" text-anchor="middle">${fmt(pCC)}</text>
      <text x="60" y="${pGTop + pGH/2 + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="16" font-weight="700" fill="#333" text-anchor="middle">${fmt(pGC)}</text>
      <text x="260" y="${cCTop + cCH/2 + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="16" font-weight="700" fill="#333" text-anchor="middle">${fmt(cCC)}</text>
      <text x="260" y="${cGTop + cGH/2 + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="16" font-weight="700" fill="#333" text-anchor="middle">${fmt(cGC)}</text>

      <text x="160" y="${trapCustY + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="18" font-weight="700" fill="${customerCountColor}" text-anchor="middle">${arrow(diffCustomerCount)}${Math.abs(diffCustomerCount)}%</text>
      <text x="160" y="${trapGisaY + 6}" font-family="Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="18" font-weight="700" fill="${gisaCountColor}" text-anchor="middle">${arrow(diffGisaCount)}${Math.abs(diffGisaCount)}%</text>
    </svg>

    <div style="display:flex;justify-content:space-between;margin-top:6px;">
      <div class="month-label" style="width:120px;">${prevLabel}</div>
      <div class="month-label" style="width:120px;">${currLabel}</div>
    </div>
  </div>`;

  document.getElementById('chartOutput').innerHTML = html;
}

function saveChart() {
  const chart = document.getElementById('chartOutput').innerHTML;
  const prevLabel = document.getElementById('prevLabel').value;
  const currLabel = document.getElementById('currLabel').value;

  const fullHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; padding: 30px; }
  .chart-wrap { width: 320px; background: white; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-box { width: 18px; height: 10px; border-radius: 2px; }
  .legend-line { width: 18px; height: 0; border-top: 2px dashed; position: relative; display: flex; align-items: center; justify-content: center; }
  .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 18px; font-weight: 700; padding: 3px 8px; border-radius: 3px; color: white; white-space: nowrap; }
  .rate-section { position: relative; height: 110px; margin-bottom: 10px; }
  .month-label { font-size: 16px; color: #333; font-weight: 500; text-align: center; }
</style>
</head>
<body>
<div class="chart-wrap">${chart}</div>
</body>
</html>`;

  const blob = new Blob([fullHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `report_${prevLabel}_${currLabel}.html`;
  a.click();
}

// 초기 그래프 자동 생성
window.onload = generateChart;
</script>
</body>
</html>
